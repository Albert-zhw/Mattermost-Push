version: '3'
services:
  mattermost-listener:
    image: python:3.11-slim
    container_name: mattermost-listener
    restart: unless-stopped
    volumes:
    working_dir: /app
    command: >
      sh -c "pip install psycopg2-binary requests && python listener.py"
    networks:
      - mattermost_default

networks:
  mattermost_default:
    external: true
